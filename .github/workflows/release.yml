name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *" # UTC, 北京时间 10:00

permissions:
  contents: write

jobs:
  build:
    name: Build Windows exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Determine artifact name
        id: artifact
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" && "${{ github.ref_name }}" == v* ]]; then
            echo "name=due-${{ github.ref_name }}-windows-x86_64" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "name=due-nightly-$(date +%Y%m%d)-windows-x86_64" >> "$GITHUB_OUTPUT"
          else
            echo "name=due-windows-x86_64" >> "$GITHUB_OUTPUT"
          fi

      - name: Create zip
        shell: pwsh
        run: |
          Compress-Archive -Path "target\release\due.exe" -DestinationPath "${{ steps.artifact.outputs.name }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.name }}.zip

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: due-${{ github.ref_name }}-windows-x86_64

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: due-${{ github.ref_name }}-windows-x86_64.zip
          generate_release_notes: true

  nightly:
    name: Create Nightly Release
    needs: build
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set nightly tag
        id: tag
        run: echo "name=nightly-$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: due-${{ steps.tag.outputs.name }}-windows-x86_64

      - name: Create nightly release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: "Nightly ${{ steps.tag.outputs.name }}"
          prerelease: true
          files: due-${{ steps.tag.outputs.name }}-windows-x86_64.zip
          body: "每夜自动构建（${{ steps.tag.outputs.name }}）。可能不稳定，仅供参考。"

      - name: Cleanup old nightly releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 获取所有 nightly release，按时间倒序，跳过前 3 个，删除其余
          gh release list --limit 50 | grep "Nightly" | tail -n +4 | while read -r line; do
            tag=$(echo "$line" | awk '{print $1}')
            gh release delete "$tag" --yes --cleanup-tag
          done
